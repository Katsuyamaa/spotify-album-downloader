<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify İndirici</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Spotify İndirici</h1>
        <p class="subtitle">Şarkı, albüm veya liste linkini yapıştır — MP3'ler klasöre kaydedilir.</p>

        <form id="download-form">
            <input
                type="url"
                name="url"
                id="url"
                placeholder="https://open.spotify.com/..."
                required
            >
            <div class="folder-row">
                <label for="output_dir">Kayıt klasörü:</label>
                <input
                    type="text"
                    name="output_dir"
                    id="output_dir"
                    value="{{ default_output }}"
                >
            </div>
            <button type="submit" id="submit-btn">İndir</button>
        </form>

        <div id="log-box" class="hidden">
            <div id="log"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById("download-form");
        const logBox = document.getElementById("log-box");
        const log = document.getElementById("log");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            log.innerHTML = "";
            logBox.classList.remove("hidden");
            submitBtn.disabled = true;
            submitBtn.textContent = "İndiriliyor...";

            const params = new URLSearchParams({
                url: document.getElementById("url").value,
                output_dir: document.getElementById("output_dir").value,
            });

            const evtSource = new EventSource("/download?" + params.toString());

            evtSource.onmessage = (e) => {
                if (e.data === "__DONE__") {
                    evtSource.close();
                    submitBtn.disabled = false;
                    submitBtn.textContent = "İndir";
                    return;
                }
                const line = document.createElement("div");
                line.className = "log-line";
                if (e.data.startsWith("✅")) line.classList.add("success");
                if (e.data.startsWith("❌")) line.classList.add("error");
                line.textContent = e.data;
                log.appendChild(line);
                log.scrollTop = log.scrollHeight;
            };

            evtSource.onerror = () => {
                evtSource.close();
                const line = document.createElement("div");
                line.className = "log-line error";
                line.textContent = "❌ Bağlantı kesildi.";
                log.appendChild(line);
                submitBtn.disabled = false;
                submitBtn.textContent = "İndir";
            };
        });
    </script>
</body>
</html>
